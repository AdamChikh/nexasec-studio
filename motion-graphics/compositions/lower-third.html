<!DOCTYPE html>
<html data-composition-variables='[
  {"id":"name","type":"string","label":"Name","default":"Adam Chikh"},
  {"id":"title","type":"string","label":"Title / Role","default":"NexaSec"},
  {"id":"accentColor","type":"color","label":"Accent","default":"#C6A15B"},
  {"id":"textColor","type":"color","label":"Text","default":"#FFFFFF"},
  {"id":"backgroundColor","type":"color","label":"Background","default":"#0A0A0C"}
]'>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
  }

  [data-composition-id="lower-third"] {
    position: relative;
    font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
  }

  .lower-third-card {
    position: absolute;
    left: 80px;
    bottom: 90px;
    display: flex;
    align-items: center;
    padding: 22px 36px 22px 28px;
    border-radius: 6px;
    /* backgroundColor is applied at 92% opacity via JS so the card
       reads clearly over any footage without going fully opaque --
       calm/premium, not a hard broadcast-style block. */
  }

  .lower-third-accent-bar {
    width: 4px;
    align-self: stretch;
    border-radius: 2px;
    margin-right: 20px;
  }

  .lower-third-name {
    font-size: 40px;
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }

  .lower-third-title {
    font-size: 24px;
    font-weight: 400;
    margin-top: 4px;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

  <div data-composition-id="lower-third" data-width="1920" data-height="1080" data-duration="5">

    <div id="lower-third-card" class="clip lower-third-card"
         data-start="0" data-duration="5" data-track-index="0">
      <div id="lower-third-accent-bar" class="lower-third-accent-bar"></div>
      <div>
        <div id="lower-third-name" class="lower-third-name"></div>
        <div id="lower-third-title" class="lower-third-title"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      (function () {
        var vars = window.__hyperframes.getVariables();

        var name = vars.name !== undefined ? vars.name : "Adam Chikh";
        var title = vars.title !== undefined ? vars.title : "NexaSec";
        var accentColor = vars.accentColor !== undefined ? vars.accentColor : "#C6A15B";
        var textColor = vars.textColor !== undefined ? vars.textColor : "#FFFFFF";
        var backgroundColor = vars.backgroundColor !== undefined ? vars.backgroundColor : "#0A0A0C";

        function hexToRgba(hex, alpha) {
          hex = hex.replace("#", "");
          var r = parseInt(hex.substring(0, 2), 16);
          var g = parseInt(hex.substring(2, 4), 16);
          var b = parseInt(hex.substring(4, 6), 16);
          return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
        }

        var card = document.getElementById("lower-third-card");
        var accentBar = document.getElementById("lower-third-accent-bar");
        var nameEl = document.getElementById("lower-third-name");
        var titleEl = document.getElementById("lower-third-title");

        nameEl.textContent = name;
        titleEl.textContent = title;

        card.style.background = hexToRgba(backgroundColor, 0.92);
        accentBar.style.background = accentColor;
        nameEl.style.color = textColor;
        titleEl.style.color = accentColor;

        // Calm, premium motion: a short slide+fade in, a hold, a
        // short slide+fade out. No bounce/elastic easing -- matches
        // the "Apple product video" brand direction, not a loud
        // YouTuber-style pop-in.
        var tl = gsap.timeline({ paused: true });

        tl.set(card, { opacity: 0, x: -24 });

        tl.to(card, {
          opacity: 1,
          x: 0,
          duration: 0.6,
          ease: "power2.out",
        }, 0);

        tl.to(card, {
          opacity: 0,
          x: -16,
          duration: 0.5,
          ease: "power2.in",
        }, 4.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["lower-third"] = tl;
      })();
    </script>

  </div>

</body>
</html>
