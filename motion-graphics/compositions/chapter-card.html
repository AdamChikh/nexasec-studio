<!DOCTYPE html>
<html data-composition-variables='[
  {"id":"chapterTitle","type":"string","label":"Chapter Title","default":"Chapter"},
  {"id":"chapterNumber","type":"string","label":"Chapter Number","default":""},
  {"id":"accentColor","type":"color","label":"Accent","default":"#C6A15B"},
  {"id":"textColor","type":"color","label":"Text","default":"#FFFFFF"},
  {"id":"backgroundColor","type":"color","label":"Background","default":"#0A0A0C"}
]'>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }

  [data-composition-id="chapter-card"] {
    position: relative;
    font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
  }

  .chapter-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    padding: 40px 64px;
    border-radius: 8px;
  }

  .chapter-number {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .chapter-title {
    font-size: 52px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .chapter-underline {
    width: 48px;
    height: 3px;
    margin: 20px auto 0;
    border-radius: 2px;
  }
</style>
</head>
<body>

  <div data-composition-id="chapter-card" data-width="1920" data-height="1080" data-duration="2.5">

    <div id="chapter-card" class="clip chapter-card"
         data-start="0" data-duration="2.5" data-track-index="0">
      <div id="chapter-number" class="chapter-number"></div>
      <div id="chapter-title" class="chapter-title"></div>
      <div id="chapter-underline" class="chapter-underline"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      (function () {
        var vars = window.__hyperframes.getVariables();

        var chapterTitle = vars.chapterTitle !== undefined ? vars.chapterTitle : "Chapter";
        var chapterNumber = vars.chapterNumber !== undefined ? vars.chapterNumber : "";
        var accentColor = vars.accentColor !== undefined ? vars.accentColor : "#C6A15B";
        var textColor = vars.textColor !== undefined ? vars.textColor : "#FFFFFF";
        var backgroundColor = vars.backgroundColor !== undefined ? vars.backgroundColor : "#0A0A0C";

        function hexToRgba(hex, alpha) {
          hex = hex.replace("#", "");
          var r = parseInt(hex.substring(0, 2), 16);
          var g = parseInt(hex.substring(2, 4), 16);
          var b = parseInt(hex.substring(4, 6), 16);
          return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
        }

        var card = document.getElementById("chapter-card");
        var numberEl = document.getElementById("chapter-number");
        var titleEl = document.getElementById("chapter-title");
        var underline = document.getElementById("chapter-underline");

        card.style.background = hexToRgba(backgroundColor, 0.88);
        numberEl.style.color = accentColor;
        numberEl.textContent = chapterNumber;
        numberEl.style.display = chapterNumber ? "block" : "none";
        titleEl.style.color = textColor;
        titleEl.textContent = chapterTitle;
        underline.style.background = accentColor;

        // Brief and unobtrusive by design -- a chapter card should
        // announce and get out of the way, not linger like a
        // lower-third. Scale+fade in, short hold, fade out.
        var tl = gsap.timeline({ paused: true });

        tl.set(card, { opacity: 0, scale: 0.94 });

        tl.to(card, {
          opacity: 1,
          scale: 1,
          duration: 0.45,
          ease: "power2.out",
        }, 0);

        tl.to(card, {
          opacity: 0,
          scale: 0.98,
          duration: 0.4,
          ease: "power2.in",
        }, 2.05);

        window.__timelines = window.__timelines || {};
        window.__timelines["chapter-card"] = tl;
      })();
    </script>

  </div>

</body>
</html>
