<!DOCTYPE html>
<html data-composition-variables='[
  {"id":"ctaText","type":"string","label":"Call to Action","default":"Subscribe for more"},
  {"id":"accentColor","type":"color","label":"Accent","default":"#C6A15B"},
  {"id":"textColor","type":"color","label":"Text","default":"#FFFFFF"},
  {"id":"backgroundColor","type":"color","label":"Background","default":"#0A0A0C"}
]'>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }

  [data-composition-id="outro"] {
    position: relative;
    font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .outro-content {
    text-align: center;
  }

  .outro-wordmark {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .outro-accent-line {
    width: 64px;
    height: 3px;
    margin: 24px auto;
    border-radius: 2px;
  }

  .outro-cta {
    font-size: 34px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

  <div data-composition-id="outro" data-width="1920" data-height="1080" data-duration="4">

    <div id="outro-bg" class="clip" data-start="0" data-duration="4"
         data-track-index="0"
         style="position:absolute; inset:0;"></div>

    <div id="outro-content" class="clip outro-content"
         data-start="0" data-duration="4" data-track-index="1">
      <div id="outro-wordmark" class="outro-wordmark">NexaSec</div>
      <div id="outro-accent-line" class="outro-accent-line"></div>
      <div id="outro-cta" class="outro-cta"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      (function () {
        var vars = window.__hyperframes.getVariables();

        var ctaText = vars.ctaText !== undefined ? vars.ctaText : "Subscribe for more";
        var accentColor = vars.accentColor !== undefined ? vars.accentColor : "#C6A15B";
        var textColor = vars.textColor !== undefined ? vars.textColor : "#FFFFFF";
        var backgroundColor = vars.backgroundColor !== undefined ? vars.backgroundColor : "#0A0A0C";

        var bg = document.getElementById("outro-bg");
        var wordmark = document.getElementById("outro-wordmark");
        var accentLine = document.getElementById("outro-accent-line");
        var ctaEl = document.getElementById("outro-cta");
        var content = document.getElementById("outro-content");

        bg.style.background = backgroundColor;
        wordmark.style.color = textColor;
        accentLine.style.background = accentColor;
        ctaEl.style.color = accentColor;
        ctaEl.textContent = ctaText;

        var tl = gsap.timeline({ paused: true });

        tl.set(content, { opacity: 0, y: 16 });
        tl.set(accentLine, { scaleX: 0 });

        tl.to(content, {
          opacity: 1,
          y: 0,
          duration: 0.7,
          ease: "power2.out",
        }, 0);

        tl.to(accentLine, {
          scaleX: 1,
          duration: 0.5,
          ease: "power2.out",
        }, 0.4);

        tl.to(content, {
          opacity: 0,
          duration: 0.6,
          ease: "power2.in",
        }, 3.4);

        window.__timelines = window.__timelines || {};
        window.__timelines["outro"] = tl;
      })();
    </script>

  </div>

</body>
</html>
