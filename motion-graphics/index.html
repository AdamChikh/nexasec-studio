<!DOCTYPE html>
<html>
<body>
  <!--
    This project has no single "main" composition -- each file under
    compositions/ is rendered independently via:

      npx hyperframes render --composition compositions/<name>.html ...

    This index.html exists only so the directory is recognized as a
    valid Hyperframes project by the CLI (lint/preview/doctor).
  -->
  <div id="root" data-composition-id="root" data-start="0"
       data-width="1920" data-height="1080" data-duration="1">
  </div>
</body>
</html>
